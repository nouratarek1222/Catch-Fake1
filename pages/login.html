<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">

  <!-- Icons (Font Awesome) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <!-- Navbar -->
  
<nav class="navbar">
  <h2>Catch Fake</h2>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="contact.html">Contact</a>

    <!-- Dashboard -->
    <a href="dashboard.html" id="dashboardLink">Dashboard</a>

    <!-- Login -->
    <a href="login.html" id="loginLink" class="login-btn">Log in</a>
  </div>
</nav>


  <!-- Login Section -->
  <div class="container">
    <form class="card" id="loginForm">

      <h2>LOGIN</h2>

      <!-- Email -->
      <label>Email address</label>
      <input type="email" id="email">

      <!-- Password -->
      <label>Password</label>

      <input type="password" id="password">


      <p class="hint">
  Password must contain:
  uppercase, lowercase, number, special character (min 8)
</p>
      
        <!-- Error -->
      <p class="error" id="errorMsg"></p>

      <!-- Button -->
      <button type="submit" class="main-btn">SIGN IN</button>
      <p class="login-link">
  Don't have an account?
  <a href="signup.html">SIGN UP</a>
</p>

    </form>
  </div>

  <!-- JS -->
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
