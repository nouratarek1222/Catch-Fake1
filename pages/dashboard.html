<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <!-- Logo -->
  <link rel="icon" href="../assets/faction.png">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<!-- ================= NAVBAR ================= -->

<nav class="navbar">

  <!-- Logo -->
  <h2 class="logo-text">
    <img src="../assets/logo.png" class="logo-img">
    Catch <span>Fake</span>
  </h2>

  <!-- Links -->
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="contact.html">Contact</a>
    <a href="dashboard.html" class="active">Dashboard</a>
    
  </div>

  <!-- User -->
  <div class="user-box">
    <img class="user-img">
    <span id="userName"></span>

    <a href="#" class="logout-btn" onclick="logout()">
  <i class="fa-solid fa-right-from-bracket"></i> Logout
</a>
  </div>

</nav>
<!-- ================= DASHBOARD ================= -->

<div class="dashboard">

  <!-- Welcome -->
  <h1 id="welcomeText">Welcome back</h1>

  <!-- Cards -->
  <div class="cards">

    <div class="card">
      <h3>Total Media Analyzed</h3>
      <p class="number" id="totalCount">0</p>
      <span>This month</span>
    </div>

    <div class="card">
      <h3>Fake Media Detected</h3>
      <p class="number fake" id="fakeCount">0</p>
      <span>This month</span>
    </div>

    <div class="card">
      <h3>Real Media Detected</h3>
      <p class="number real" id="realCount">0</p>
      <span>This month</span>
    </div>

  </div>

  <!-- Upload -->
  <button class="upload-btn">Upload New File</button>

  <!-- Table -->
  <div class="table-section">

    <h2>Recent Analysis</h2>

    <table>
      <tr>
        <th>File Name</th>
        <th>Type</th>
        <th>Result</th>
        <th>Confidence</th>
        <th>Date</th>
      </tr>

      <tr>
        <td>---</td>
        <td>---</td>
        <td><span class="badge fake">---</span></td>
        <td>
          <div class="progress">
            <div class="progress-fill" style="width: 0%;"></div>
          </div>
        </td>
        <td>---</td>
      </tr>

    </table>

  </div>

</div>

<!-- ================= JS ================= -->

<script src="../js/dashboard.js"></script>

<script>
  // 🔐 
  const isLoggedIn = localStorage.getItem("isLoggedIn");
  if (!isLoggedIn) {
    window.location.href = "login.html";
  }

  // 👤 بيانات المستخدم
  const user = JSON.parse(localStorage.getItem("user"));
  const userName = document.getElementById("userName");
  const userImg = document.querySelector(".user-img");
  const welcomeText = document.getElementById("welcomeText");

  if (user) {
    if (userName) userName.textContent = user.name;

    if (welcomeText) {
      welcomeText.textContent = "Welcome back, " + user.name;
    }

    if (userImg) {
      userImg.src = `https://ui-avatars.com/api/?name=${user.name}&background=00cfff&color=fff`;
    }
  }

  // 🚪 Logout
  function logout() {
    localStorage.removeItem("isLoggedIn");
    window.location.href = "login.html";
  }
</script>

</body>
</html>
