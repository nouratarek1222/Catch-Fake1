

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar">
    <h2>Catch Fake</h2>

    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="contact.html">Contact</a>
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="login.html" class="login-btn">Log in</a>
    </div>
  </nav>

  <!-- Dashboard -->
  <div class="dashboard">

    <!-- Welcome -->
    <h1 id="welcomeText">Welcome back, User</h1>

    <!-- Cards -->
    <div class="cards">

      <div class="card">
        <h3>Total Media Analyzed</h3>
        <p class="number" id="totalCount">0</p>
        <span>This month</span>
      </div>

      <div class="card">
        <h3>Fake Media Detected</h3>
        <p class="number fake" id="fakeCount">0</p>
        <span>This month</span>
      </div>

      <div class="card">
        <h3>Real Media Detected</h3>
        <p class="number real" id="realCount">0</p>
        <span>This month</span>
      </div>

    </div>

    <!-- Upload -->
    <button class="upload-btn">Upload New File</button>

    <!-- Table -->
    <div class="table-section">

      <h2>Recent Analysis</h2>

      <table>
        <tr>
          <th>File Name</th>
          <th>Type</th>
          <th>Result</th>
          <th>Confidence</th>
          <th>Date</th>
        </tr>

        <!-- Example Row (ممكن تمسحيه بعدين) -->
        <tr>
          <td>---</td>
          <td>---</td>
          <td><span class="badge fake">---</span></td>
          <td>
            <div class="progress">
              <div class="progress-fill" style="width: 0%;"></div>
            </div>
          </td>
          <td>---</td>
        </tr>

      </table>

    </div>

  </div>

  <script src="../js/dashboard.js"></script>

</body>
</html>
